<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>European Football Club Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">&#9679;</span>
    <div class="brand-text">
      <h1>Club Map</h1>
      <p>282 clubs · 15 leagues · 8 countries</p>
    </div>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Find a club or city…" autocomplete="off">
  </div>

  <div class="league-filter">
    <select id="leagueSelect">
      <option value="">All leagues</option>
    </select>
  </div>
</header>

<main>
  <div id="map"></div>

  <aside id="infoPanel" class="info-panel hidden">
    <button id="closePanel" class="close-btn" aria-label="Close">&times;</button>
    <div id="panelContent"></div>
  </aside>
</main>

<footer class="statusbar">
  <span id="clubCount">Loading clubs…</span>
  <span class="dim">Basemap: &copy; OpenStreetMap contributors &copy; CARTO &nbsp;·&nbsp; club positions approximate (home city)</span>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
